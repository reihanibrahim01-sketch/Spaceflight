name: Build APK with Docker

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          docker run --rm \
            -v $PWD:/home/user \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer \
            buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: spaceflight-apk
          path: bin/*.apk
